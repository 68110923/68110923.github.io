<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>68110923 · projects</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐊</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Outfit','Segoe UI',sans-serif;
    background:#0f0f1a;color:#e4e4f0;min-height:100vh;overflow-x:hidden;
}

/* Animated BG */
.bg{
    position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.bg .orb{
    position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;
    animation:orbFloat 20s ease-in-out infinite;
}
.bg .orb:nth-child(1){width:500px;height:500px;background:#6366f1;top:-200px;left:-100px;animation-delay:0s}
.bg .orb:nth-child(2){width:400px;height:400px;background:#a855f7;bottom:-150px;right:-100px;animation-delay:-7s}
.bg .orb:nth-child(3){width:300px;height:300px;background:#06b6d4;top:50%;left:60%;animation-delay:-14s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)scale(1)}25%{transform:translate(60px,-40px)scale(1.1)}50%{transform:translate(-30px,60px)scale(.9)}75%{transform:translate(40px,30px)scale(1.05)}}

.container{max-width:1120px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* Hero */
.hero{text-align:center;padding:100px 0 50px}
.hero-avatar{
    width:90px;height:90px;border-radius:50%;margin:0 auto 20px;overflow:hidden;
    border:2px solid rgba(255,255,255,.12);padding:3px;
    background:linear-gradient(135deg,#6366f1,#a855f7,#06b6d4);
}
.hero-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;background:#0f0f1a}
.hero-name{
    font-size:2.6rem;font-weight:800;letter-spacing:-.02em;
    background:linear-gradient(135deg,#c4b5fd,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;margin-bottom:6px;
}
.hero-bio{font-size:1rem;color:rgba(255,255,255,.4);margin-bottom:32px}

/* Glass stats */
.glass-stats{
    display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:48px;
}
.glass-stat{
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
    border-radius:16px;padding:14px 28px;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:center;gap:10px;font-size:.85rem;color:rgba(255,255,255,.5);
}
.glass-stat strong{font-size:1.2rem;color:#e4e4f0;font-weight:700}

/* Controls */
.controls{display:flex;gap:10px;margin-bottom:36px;align-items:center;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap .fa-magnifying-glass{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:.85rem}
.search-wrap input{
    width:100%;padding:12px 16px 12px 42px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
    border-radius:12px;font-family:inherit;font-size:.9rem;color:#e4e4f0;
    outline:none;transition:all .3s;
}
.search-wrap input:focus{border-color:rgba(99,102,241,.3);box-shadow:0 0 0 4px rgba(99,102,241,.1)}
.search-wrap input::placeholder{color:rgba(255,255,255,.15)}
.filter-group{display:flex;gap:4px;background:rgba(255,255,255,.03);border-radius:10px;padding:3px}
.filter-btn{
    font-family:inherit;font-size:.8rem;font-weight:500;padding:7px 18px;
    border:none;border-radius:8px;cursor:pointer;transition:all .25s;
    background:transparent;color:rgba(255,255,255,.4);
}
.filter-btn.active{background:rgba(99,102,241,.2);color:#a5b4fc}
.filter-btn:hover:not(.active){color:rgba(255,255,255,.7)}
.sort-select{
    font-family:inherit;font-size:.8rem;padding:8px 14px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;
    color:rgba(255,255,255,.4);outline:none;cursor:pointer;transition:all .25s;
}
.sort-select:hover{border-color:rgba(255,255,255,.12)}

/* Grid */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding-bottom:80px}
.project-card{
    background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
    border-radius:20px;padding:28px;position:relative;overflow:hidden;
    transition:all .4s cubic-bezier(.4,0,.2,1);
    animation:fadeUp .5s ease-out both;
}
.project-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.08),transparent 60%);opacity:0;transition:opacity .4s}
.project-card:hover{transform:translateY(-8px);border-color:rgba(99,102,241,.2);box-shadow:0 24px 60px rgba(0,0,0,.4)}
.project-card:hover::before{opacity:1}

.card-glow{
    position:absolute;top:-50%;right:-50%;width:100%;height:100%;
    background:radial-gradient(circle,rgba(99,102,241,.06),transparent 70%);
    opacity:0;transition:opacity .5s;pointer-events:none;
}
.project-card:hover .card-glow{opacity:1}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:relative;z-index:1;margin-bottom:10px}
.repo-name{font-size:1.1rem;font-weight:700;color:#e4e4f0;display:flex;align-items:center;gap:8px}
.repo-name i{font-size:.6rem;opacity:0;transition:all .3s;color:#818cf8}
.project-card:hover .repo-name i{opacity:1;transform:translate(2px,-2px)}
.card-badges{display:flex;gap:6px;flex-shrink:0}
.badge{font-size:.6rem;font-weight:600;padding:3px 12px;border-radius:20px;letter-spacing:.03em;text-transform:uppercase}
.badge.pages{background:rgba(99,102,241,.15);color:#a5b4fc}
.badge.private{background:rgba(244,63,94,.12);color:#fb7185}
.badge.public{background:rgba(52,211,153,.1);color:#6ee7b7}
.repo-desc{font-size:.88rem;color:rgba(255,255,255,.35);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;position:relative;z-index:1}
.repo-topics{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;position:relative;z-index:1}
.topic-tag{
    font-size:.6rem;font-weight:500;padding:2px 10px;border-radius:12px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.3);
    transition:all .2s;
}
.topic-tag:hover{background:rgba(99,102,241,.1);color:#a5b4fc;border-color:rgba(99,102,241,.2)}
.card-meta{
    display:flex;align-items:center;gap:14px;font-size:.78rem;color:rgba(255,255,255,.25);
    position:relative;z-index:1;flex-wrap:wrap;
}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-link{
    margin-left:auto;padding:6px 18px;border-radius:10px;font-size:.78rem;font-weight:600;
    background:rgba(99,102,241,.1);color:#a5b4fc;
    transition:all .3s;display:inline-flex;align-items:center;gap:6px;
}
.card-link:hover{background:rgba(99,102,241,.2);transform:translateX(3px)}

/* Skeleton */
.skeleton-card{border-radius:20px;border:1px solid rgba(255,255,255,.06);padding:28px;background:rgba(255,255,255,.02)}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;border-radius:8px;animation:shimmer 1.8s infinite;height:14px;margin-bottom:12px}
.skeleton.short{width:30%}.skeleton.long{width:85%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.empty-state,.error-state{text-align:center;padding:80px 20px;grid-column:1/-1;color:rgba(255,255,255,.2)}
.error-state .fa-solid{font-size:2.5rem;margin-bottom:12px}
.error-state h3{font-size:1rem;color:rgba(255,255,255,.4);margin-bottom:6px}
.error-state p{font-size:.85rem;margin-bottom:16px}
.retry-btn{font-family:inherit;padding:10px 24px;border-radius:10px;font-size:.85rem;font-weight:600;border:none;background:rgba(99,102,241,.15);color:#a5b4fc;cursor:pointer;transition:all .3s}
.retry-btn:hover{background:rgba(99,102,241,.25)}

.footer{text-align:center;padding:30px 20px 40px;color:rgba(255,255,255,.15);font-size:.8rem;border-top:1px solid rgba(255,255,255,.04)}
.footer a{color:rgba(255,255,255,.3);transition:color .2s}
.footer a:hover{color:#a5b4fc}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
    .hero{padding:70px 0 30px}.hero-name{font-size:1.8rem}
    .glass-stat{padding:10px 18px}.glass-stats{gap:10px}
    .controls{flex-direction:column}
    .project-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
    .hero{padding:50px 0 20px}.hero-name{font-size:1.5rem}
    .project-card{padding:20px}.container{padding:0 16px}
}
</style>
</head>
<body>
<div class="bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="container">
<div class="hero">
    <div class="hero-avatar"><img id="avatarImg" src="https://avatars.githubusercontent.com/u/68110923?v=4" alt=""></div>
    <h1 class="hero-name" id="heroName">68110923</h1>
    <p class="hero-bio" id="heroBio">Loading...</p>
    <div class="glass-stats">
        <div class="glass-stat">📦 <strong id="statRepos">--</strong> Projects</div>
        <div class="glass-stat">🌐 <strong id="statPages">--</strong> Pages</div>
        <div class="glass-stat">⭐ <strong id="statStars">--</strong> Stars</div>
        <div class="glass-stat">🍴 <strong id="statForks">--</strong> Forks</div>
    </div>
</div>

<div class="controls">
    <div class="search-wrap"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Search projects..." autocomplete="off"></div>
    <div class="filter-group">
        <button class="filter-btn" data-filter="all">All</button>
        <button class="filter-btn active" data-filter="pages">Featured</button>
    </div>
    <select class="sort-select" id="sortSelect">
        <option value="updated">Latest</option>
        <option value="stars">Stars</option>
        <option value="name">A–Z</option>
    </select>
</div>

<div class="project-grid card-stagger" id="projectGrid">
    <div class="skeleton-card"><div class="skeleton short"></div><div class="skeleton long" style="margin-top:16px"></div><div class="skeleton" style="width:50%"></div></div>
    <div class="skeleton-card"><div class="skeleton short"></div><div class="skeleton long" style="margin-top:16px"></div><div class="skeleton" style="width:50%"></div></div>
    <div class="skeleton-card"><div class="skeleton short"></div><div class="skeleton long" style="margin-top:16px"></div><div class="skeleton" style="width:50%"></div></div>
    <div class="skeleton-card"><div class="skeleton short"></div><div class="skeleton long" style="margin-top:16px"></div><div class="skeleton" style="width:50%"></div></div>
</div>

<div class="footer"><p>© <span id="footerYear">2026</span> 68110923 · <a href="https://github.com/68110923" target="_blank" rel="noopener">GitHub</a></p></div>
</div>

<script>
const A=GITHUB_API,P=GITHUB_PAGES;
let all=[],cf='pages',cs='updated',sq='';
const g=document.getElementById('projectGrid'),si=document.getElementById('searchInput'),ss=document.getElementById('sortSelect'),fb=document.querySelectorAll('.filter-btn');
function rt(d){const n=Date.now(),t=new Date(d).getTime(),df=Math.max(0,n-t),m=Math.floor(df/6e4);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';const D=Math.floor(h/24);if(D<30)return D+'d';const M=Math.floor(D/30);return M<12?M+'mo':Math.floor(M/12)+'y'}
async function fu(){const r=await fetch(`${A}/users/${U}`);if(!r.ok)throw Error();return r.json()}
async function fr(){let a=[],p=1;while(1){const r=await fetch(`${A}/users/${U}/repos?per_page=100&page=${p}&sort=updated`);if(!r.ok)throw Error();const d=await r.json();if(!d.length)break;a=a.concat(d);p++}return a}

function render(repos){
    if(!repos.length){g.innerHTML='<div class="empty-state"><p style="color:rgba(255,255,255,.2)">No matches</p></div>';return}
    g.innerHTML=repos.map(function(r,i){var hp=r.has_pages,url=hp?'${PAGES}/${r.name}/':r.html_url,lb=hp?'visit':'source',pr=r.private,lc=LANG_COLORS[r.language]||DEFAULT_LANG_COLOR;
    return '<div class="project-card" style="animation-delay:'+Math.min(i*.04,.5)+'s"><div class="card-glow"></div><div class="card-top"><div class="repo-name"><span>'+r.name+'</span><i class="fa-solid fa-arrow-up-right-from-square"></i></div><div class="card-badges">'+(hp?'<span class="badge pages">Pages</span>':'')+(pr?'<span class="badge private">Private</span>':'<span class="badge public">Public</span>')+'</div></div><div class="repo-desc" title="'+(r.description||'').replace(/"/g,"&quot;")+'">'+(r.description||'No description')+'</div>'+(r.topics&&r.topics.length?'<div class="repo-topics">'+r.topics.map(function(t){return'<span class="topic-tag">'+t+'</span>'}).join('')+'</div>':'')+'<div class="card-meta"><a href="'+r.html_url+'" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:4px" title="Star on GitHub">⭐ '+r.stargazers_count+'</a><span>🍴 '+r.forks_count+'</span>'+(r.language?'<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+lc+';vertical-align:middle"></span> '+r.language+'</span>':'')+'<span>'+rt(r.pushed_at)+'</span><a href="'+url+'" target="_blank" rel="noopener" class="card-link">'+lb+' →</a></div></div>'}).join('')}
function apply(){var l=[].concat(all);if(cf==='pages')l=l.filter(function(x){return x.has_pages});if(sq){var q=sq.toLowerCase();l=l.filter(function(x){return x.name.toLowerCase().indexOf(q)!==-1||(x.description&&x.description.toLowerCase().indexOf(q)!==-1)})}
if(cs==='stars')l.sort(function(a,b){return b.stargazers_count-a.stargazers_count});else if(cs==='name')l.sort(function(a,b){return a.name.localeCompare(b.name)});else l.sort(function(a,b){return new Date(b.pushed_at)-new Date(a.pushed_at)});render(l)}
function us(repos,u){document.getElementById('statRepos').textContent=repos.length;document.getElementById('statPages').textContent=repos.filter(function(x){return x.has_pages}).length;document.getElementById('statStars').textContent=repos.reduce(function(s,r){return s+r.stargazers_count},0);document.getElementById('statForks').textContent=repos.reduce(function(s,r){return s+r.forks_count},0);if(u){document.getElementById('heroName').textContent=u.login;document.getElementById('heroBio').textContent=u.bio||'Developer';document.getElementById('avatarImg').src=u.avatar_url}}
async function init(){try{var ur=await Promise.all([fu(),fr()]);var u=ur[0],repos=ur[1];all=repos.filter(function(r){return !r.fork&&r.name!==USERNAME+'.github.io'});us(all,u);apply()}catch(e){g.innerHTML='<div class="error-state"><i class="fa-solid fa-cloud-bolt"></i><h3>Connection lost</h3><p>'+e.message+'</p><button class="retry-btn" onclick="init()">Retry</button></div>'}}
si.addEventListener('input',function(e){sq=e.target.value;apply()});ss.addEventListener('change',function(e){cs=e.target.value;apply()});
fb.forEach(function(b){b.addEventListener('click',function(){fb.forEach(function(x){x.classList.remove('active')});b.classList.add('active');cf=b.dataset.filter;apply()})});
document.getElementById('footerYear').textContent=new Date().getFullYear();init();
</script>
</body>
</html>
