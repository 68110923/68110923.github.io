<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>68110923 | 个人主页</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐊</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="fa-regular fa-sun"></i>
    </button>

    <section class="hero">
        <div class="container">
            <div class="hero-avatar">
                <img id="avatarImg" src="https://avatars.githubusercontent.com/u/68110923?v=4" alt="avatar">
            </div>
            <h1 class="hero-name" id="heroName">68110923</h1>
            <p class="hero-bio" id="heroBio">Loading...</p>
            <div class="hero-actions">
                <a class="hero-btn hero-btn-primary" href="https://github.com/68110923" target="_blank" rel="noopener">
                    <i class="fa-brands fa-github"></i> GitHub
                </a>
            </div>
        </div>
    </section>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item"><div class="stat-icon">📦</div><div class="stat-value" id="statProjects">--</div><div class="stat-label">Projects</div></div>
        <div class="stat-item"><div class="stat-icon">🌐</div><div class="stat-value" id="statImportant">--</div><div class="stat-label">Important</div></div>
        <div class="stat-item"><div class="stat-icon">⭐</div><div class="stat-value" id="statStars">--</div><div class="stat-label">Stars</div></div>
        <div class="stat-item"><div class="stat-icon">🍴</div><div class="stat-value" id="statForks">--</div><div class="stat-label">Forks</div></div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input class="search-bar" id="searchInput" type="text" placeholder="搜索项目..." autocomplete="off">
            </div>
            <div class="filter-group">
                <button class="filter-btn" data-filter="all">全部</button>
                <button class="filter-btn active" data-filter="pages">精选</button>
            </div>
            <select class="sort-select" id="sortSelect">
                <option value="updated">最近更新</option>
                <option value="stars">最多 Stars</option>
                <option value="name">名称 A-Z</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="project-grid card-stagger" id="projectGrid">
            <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="margin-top:16px"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line" style="width:50%;margin-top:16px"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="margin-top:16px"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line" style="width:50%;margin-top:16px"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="margin-top:16px"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line" style="width:50%;margin-top:16px"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="margin-top:16px"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line" style="width:50%;margin-top:16px"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="margin-top:16px"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line" style="width:50%;margin-top:16px"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="margin-top:16px"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line" style="width:50%;margin-top:16px"></div></div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>© <span id="footerYear">2026</span> 68110923 · 数据来自 <a href="https://github.com/68110923" target="_blank" rel="noopener">GitHub</a> · 自动同步</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
